esphome:
  name: station-bat
  friendly_name: station-bat

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "kskifVUsqSCTsFTm2PpevoEmO8cTLpzDcRKSjCNepDw="

ota:
  - platform: esphome
    password: "2f45d60ef8514c7dc027ba6faa28d5bb"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Station-Bat Fallback Hotspot"
    password: "JahANnrx22J3"

external_components:
  - source: github://Jasionf/echo-pyramid-components
    components: [m5station_axp192]
    refresh: 0s

i2c:
  - id: i2c_bus
    sda: GPIO21
    scl: GPIO22


spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

captive_portal:
    

sensor:
  - platform: mpu6886
    i2c_id: i2c_bus
    accel_x:
      name: "MPU6886 Accel X"
    accel_y:
      name: "MPU6886 Accel Y"
    accel_z:
      name: "MPU6886 Accel z"
    gyro_x:
      name: "MPU6886 Gyro X"
    gyro_y:
      name: "MPU6886 Gyro Y"
    gyro_z:
      name: "MPU6886 Gyro z"
    temperature:
      name: "MPU6886 Temperature"
    update_interval: 5s

  - platform: m5station_axp192
    id: pmu
    i2c_id: i2c_bus
    battery_level:
      name: "M5Station Battery Level"
    update_interval: 60s
    brightness: 0.8



binary_sensor:
  - platform: gpio
    name: "Button1"
    pin:
      number: GPIO37
      inverted: true

  - platform: gpio
    name: "Button2"
    pin:
      number: GPIO38
      inverted: true

  - platform: gpio
    name: "Button3"
    pin:
      number: GPIO39  # Fix: assign the correct GPIO pin
      inverted: true

  # Use Button1 to control LCD backlight via AXP192 LDO3
  - platform: template
    name: "LCD Backlight"
    id: lcd_backlight
    lambda: |-
      // Return current assumed state (not tracked, default to ON)
      return true;
    on_press:
      then:
        - lambda: |-
            id(pmu).set_backlight(true);
    on_release:
      then:
        - lambda: |-
            id(pmu).set_backlight(false);

    
# Example minimal configuration entry
display:
  - platform: st7789v
    model: CUSTOM
    width: 135
    height: 240
    offset_height: 0
    offset_width: 0
    cs_pin: GPIO5
    dc_pin: GPIO19
    reset_pin: GPIO15
    rotation: 90
    lambda: |-
      it.print(0, 0, id(font20), "Hello World!");


font:
  - file: "gfonts://Roboto"
    id: font20
    size: 20


time:
  - platform: bm8563
    id: bm8563_time

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO4
    num_leds: 7
    chipset: ws2812
    name: "My Light"

