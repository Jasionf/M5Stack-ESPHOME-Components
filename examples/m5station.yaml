esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "kskifVUsqSCTsFTm2PpevoEmO8cTLpzDcRKSjCNepDw="

ota:
  - platform: esphome
    password: "2f45d60ef8514c7dc027ba6faa28d5bb"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Station-Bat Fallback Hotspot"
    password: "JahANnrx22J3"

external_components:
  - source:
      type: local
      path: ../components
    components: [m5station_axp192]

i2c:
  - id: i2c_bus
    sda: GPIO21
    scl: GPIO22


spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

captive_portal:
    

sensor:
  - platform: mpu6886
    i2c_id: i2c_bus
    accel_x:
      name: "MPU6886 Accel X"
    accel_y:
      name: "MPU6886 Accel Y"
    accel_z:
      name: "MPU6886 Accel z"
    gyro_x:
      name: "MPU6886 Gyro X"
    gyro_y:
      name: "MPU6886 Gyro Y"
    gyro_z:
      name: "MPU6886 Gyro z"
    temperature:
      name: "MPU6886 Temperature"
    update_interval: 5s

  - platform: m5station_axp192
    id: pmu
    i2c_id: i2c_bus
    battery_level:
      name: "M5Station Battery Level"
    update_interval: 60s
    brightness: 0.8

# 第一个 INA3221，地址 0x40
  - platform: ina3221
    id: ina1
    i2c_id: i2c_bus
    address: 0x40
    update_interval: 1s
    channel_1:
      shunt_resistance: 0.01
      bus_voltage:
        name: "P.A1 Bus Voltage"
      current:
        name: "P.A1 Current"
    channel_2:
      shunt_resistance: 0.01
      bus_voltage:
        name: "P.A2 Bus Voltage"
      current:
        name: "P.A2 Current"
    channel_3:
      shunt_resistance: 0.01
      bus_voltage:
        name: "P.B1 Bus Voltage"
      current:
        name: "P.B1 Current"

  # 第二个 INA3221，地址 0x41
  - platform: ina3221
    id: ina2
    i2c_id: i2c_bus
    address: 0x41
    update_interval: 1s
    channel_1:
      shunt_resistance: 0.01
      bus_voltage:
        name: "P.B2 Bus Voltage"
      current:
        name: "P.B2 Current"
    channel_2:
      shunt_resistance: 0.01
      bus_voltage:
        name: "P.C1 Bus Voltage"
      current:
        name: "P.C1 Current"
    channel_3:
      shunt_resistance: 0.01
      bus_voltage:
        name: "P.C2 Bus Voltage"
      current:
        name: "P.C2 Current"

binary_sensor:
  - platform: gpio
    name: "Button1"
    pin:
      number: GPIO37
      inverted: true

  - platform: gpio
    name: "Button2"
    pin:
      number: GPIO38
      inverted: true

  - platform: gpio
    name: "Button3"
    pin:
      number: GPIO39  # Fix: assign the correct GPIO pin
      inverted: true

switch:
  # Logical switch to control LCD backlight via AXP192 LDO3
  - platform: template
    name: "LCD Backlight"
    id: lcd_backlight
    lambda: |-
      // Assume backlight is ON by default; no feedback from hardware
      return true;
    restore_mode: ALWAYS_ON
    turn_on_action:
      - lambda: |-
          id(pmu).set_backlight(true);
    turn_off_action:
      - lambda: |-
          id(pmu).set_backlight(false);

  # USB 5V power control (ESP32 GPIO12 -> USB)
  - platform: gpio
    name: "USB Power"
    pin: GPIO12

    
# Example minimal configuration entry
display:
  - platform: st7789v
    model: CUSTOM
    width: 135
    height: 240
    offset_height: 0
    offset_width: 0
    cs_pin: GPIO5
    dc_pin: GPIO19
    reset_pin: GPIO15
    rotation: 90
    update_interval: 1s
    lambda: |-
      // Fill screen with white so backlight效果明显
      it.fill(Color::WHITE);
      it.print(0, 0, id(font20), Color::BLACK, "Hello World!");


font:
  - file: "gfonts://Roboto"
    id: font20
    size: 20


time:
  - platform: bm8563
    id: bm8563_time

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO4
    num_leds: 7
    chipset: ws2812
    name: "My Light"

