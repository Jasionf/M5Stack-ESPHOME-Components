esphome:
  name: acmeasure-demo
  friendly_name: ACMeasure Demo

esp32:
  board: esp32dev
  framework:
    type: arduino

# 网络配置（替换为你自己的 Wi-Fi）
wifi:
  ssid: "YOUR_SSID"
  password: "YOUR_PASSWORD"
  ap:
    ssid: "acmeasure-demo-fallback"
    password: "fallback-password"

logger:
api:
ota:

i2c:
  sda: 21
  scl: 22
  scan: true
  id: bus_a

unit_acmeasure:
  id: acmeasure1
  address: 0x42
  update_interval: 2s
  voltage:
    name: "AC Voltage"
  current:
    name: "AC Current"
  power:
    name: "Active Power"
  apparent_power:
    name: "Apparent Power"
  power_factor:
    name: "Power Factor"
  energy:
    name: "Energy"