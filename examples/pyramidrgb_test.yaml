---
# PyramidRGB 诊断测试配置
esphome:
  name: pyramidrgb-test
  friendly_name: PyramidRGB Test

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf

# 启用详细日志
logger:
  level: DEBUG

# WiFi 配置 - 请修改为您的网络
wifi:
  ssid: "YOUR_WIFI_SSID"
  password: "YOUR_WIFI_PASSWORD"
  
  ap:
    ssid: "PyramidRGB Test"
    password: "12345678"

api:
ota:
  - platform: esphome
captive_portal:

# 外部组件
external_components:
  - source: github://Jasionf/echo-pyramid-components@main
    components: [pyramidrgb]
    refresh: 0s

# I2C 配置
i2c:
  - id: ext_bus
    sda: GPIO38
    scl: GPIO39
    scan: true  # 这会在日志中显示所有找到的 I2C 设备

# PyramidRGB 配置
pyramidrgb:
  - id: pyramid_rgb1
    i2c_id: ext_bus
    address: 0x1A
    strip: 1
    brightness: 100
    initial_white: 50  # 启动时设置一些白色光用于测试

# 输出配置
output:
  - platform: pyramidrgb
    id: test_red
    pyramidrgb_id: pyramid_rgb1
    channel: 0
    color: red
  - platform: pyramidrgb
    id: test_green
    pyramidrgb_id: pyramid_rgb1
    channel: 0
    color: green
  - platform: pyramidrgb
    id: test_blue
    pyramidrgb_id: pyramid_rgb1
    channel: 0
    color: blue

# 灯光配置
light:
  - platform: rgb
    name: "Test RGB Light"
    red: test_red
    green: test_green
    blue: test_blue
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 1s

# 开关用于测试
switch:
  - platform: template
    name: "PyramidRGB Test Switch"
    turn_on_action:
      - light.turn_on:
          id: test_rgb_light
          brightness: 100%
          red: 100%
          green: 0%
          blue: 0%
    turn_off_action:
      - light.turn_off: test_rgb_light