esphome:
  name: unit-tmos-pir
  friendly_name: unit-tmos-pir

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
api:
ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source: github://Jasionf/echo-pyramid-components
    components: [sths34pf80]
    refresh: 0s

i2c:
  sda: GPIO21
  scl: GPIO22

sensor:
  - platform: sths34pf80
    presence:
      name: "TMOS Presence Value"
    motion:
      name: "TMOS Motion Value"
    temperature:
      name: "TMOS Object Temperature"
    update_interval: 1s
