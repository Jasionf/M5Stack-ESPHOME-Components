esphome:
  name: unit-tmos
  friendly_name: Unit TMOS

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "S0W2C44rqzg6AcwgtmQ7KYnWnf+kY34mMPn3ESL9h8k="

ota:
  - platform: esphome
    password: "7251c3c1477c19ec0aecae9b1953e9e7"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Unit-Tmos Fallback Hotspot"
    password: "047BAbG8PLK3"

external_components:
  - source: github://Jasionf/echo-pyramid-components
    components: [sths34pf80]
    refresh: 0s

i2c:
  sda: GPIO2
  scl: GPIO1
  scan: true

sensor:
  - platform: sths34pf80
    pres_flag:
      name: "TMOS Presence Detected"
    mot_flag:
      name: "TMOS Motion Detected"
    presence_threshold: 200   # 0xC8 – same as Arduino example
    motion_threshold: 200     # 0xC8
    presence_hysteresis: 50   # 0x32
    motion_hysteresis: 50     # 0x32
    # odr: internal sensor DSP sampling rate (1=0.25Hz … 8=30Hz, default 8)
    # Must be HIGHER than 1/update_interval.  At odr=3 (1Hz) human breathing
    # produces ~1-second thermal deltas that easily exceed threshold 200 →
    # mot_flag is always ON.  At odr=8 (30Hz, same as Arduino example) each
    # frame is 33 ms apart → still person generates near-zero deltas → works correctly.
    odr: 8          # 30 Hz – matches Arduino setTmosODR(STHS34PF80_TMOS_ODR_AT_30Hz)
    update_interval: 1s   # how often ESPHome reads & reports (independent of odr)

captive_portal:
    